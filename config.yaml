data:
  sample_size: 10000
  test_size: 0.2
  random_state: 42

features:
  user_cols: ['user_id', 'device_type', 'age_group']
  ad_cols: ['ad_id', 'campaign_id', 'category']
  context_cols: ['hour', 'day_of_week', 'position']
  target: 'click'
  
  # Features to be generated
  cross_cols:
    - ['user_id', 'ad_id']
    - ['device_type', 'category']
    
model:
  type: 'lightgbm' # lightgbm or xgboost
  
  lightgbm_params:
    learning_rate: 0.05
    n_estimators: 200
    max_depth: -1
    num_leaves: 31
    objective: 'binary'
    scale_pos_weight: 1.0 # Will be updated dynamically by imbalance handler
    
  xgboost_params:
    learning_rate: 0.05
    n_estimators: 200
    max_depth: 6
    objective: 'binary:logistic'
    scale_pos_weight: 1.0

lstm:
  embedding_dim: 32
  hidden_dim: 64
  num_layers: 1
  epochs: 5
  batch_size: 256
  learning_rate: 0.001

tune:
  n_trials: 20
  
serve:
  host: "0.0.0.0"
  port: 8000
